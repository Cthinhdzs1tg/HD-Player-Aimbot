name: Build Aimbot EXE (Windows x64)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Setup Visual Studio Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Create Aimbot.vcxproj
        shell: cmd
        run: |
          echo ^<?xml version="1.0" encoding="utf-8"?^> > Aimbot.vcxproj
          echo ^<Project DefaultTargets="Build" xmlns="http://schemas.microsoft.com/developer/msbuild/2003"^> >> Aimbot.vcxproj
          echo   ^<ItemGroup Label="ProjectConfigurations"^> >> Aimbot.vcxproj
          echo     ^<ProjectConfiguration Include="Release^|x64"^> >> Aimbot.vcxproj
          echo       ^<Configuration^>Release^</Configuration^> >> Aimbot.vcxproj
          echo       ^<Platform^>x64^</Platform^> >> Aimbot.vcxproj
          echo     ^</ProjectConfiguration^> >> Aimbot.vcxproj
          echo   ^</ItemGroup^> >> Aimbot.vcxproj
          echo   ^<PropertyGroup Condition="'$(Configuration)^|$(Platform)'=='Release^|x64'" Label="Configuration"^> >> Aimbot.vcxproj
          echo     ^<ConfigurationType^>Application^</ConfigurationType^> >> Aimbot.vcxproj
          echo     ^<UseDebugLibraries^>false^</UseDebugLibraries^> >> Aimbot.vcxproj
          echo     ^<PlatformToolset^>v143^</PlatformToolset^> >> Aimbot.vcxproj
          echo     ^<WholeProgramOptimization^>true^</WholeProgramOptimization^> >> Aimbot.vcxproj
          echo     ^<CharacterSet^>Unicode^</CharacterSet^> >> Aimbot.vcxproj
          echo     ^<RuntimeLibrary^>MultiThreaded^</RuntimeLibrary^> >> Aimbot.vcxproj
          echo   ^</PropertyGroup^> >> Aimbot.vcxproj
          echo   ^<Import Project="$(VCTargetsPath)\Microsoft.Cpp.props" /^> >> Aimbot.vcxproj
          echo   ^<ItemGroup^> >> Aimbot.vcxproj
          echo     ^<ClCompile Include="main.cpp" /^> >> Aimbot.vcxproj
          echo   ^</ItemGroup^> >> Aimbot.vcxproj
          echo   ^<Import Project="$(VCTargetsPath)\Microsoft.Cpp.targets" /^> >> Aimbot.vcxproj
          echo ^</Project^> >> Aimbot.vcxproj

      - name: Build Release x64
        run: msbuild Aimbot.vcxproj /p:Configuration=Release /p:Platform=x64 /m /verbosity:minimal

      - name: Upload Aimbot.exe
        uses: actions/upload-artifact@v4
        with:
          name: Aimbot-EXE
          path: x64/Release/Aimbot.exe
          if-no-files-found: error
          retention-days: 30
