name: Build Aimbot EXE (Windows x64)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Setup Visual Studio Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Create Aimbot.vcxproj (Final Fixed)
        shell: cmd
        run: |
          echo ^<?xml version="1.0" encoding="utf-8"?^> > Aimbot.vcxproj
          echo ^<Project DefaultTargets="Build" ToolsVersion="17.0" xmlns="http://schemas.microsoft.com/developer/msbuild/2003"^> >> Aimbot.vcxproj
          echo   ^<ItemGroup Label="ProjectConfigurations"^> >> Aimbot.vcxproj
          echo     ^<ProjectConfiguration Include="Release|x64"^> >> Aimbot.vcxproj
          echo       ^<Configuration^>Release^</Configuration^> >> Aimbot.vcxproj
          echo       ^<Platform^>x64^</Platform^> >> Aimbot.vcxproj
          echo     ^</ProjectConfiguration^> >> Aimbot.vcxproj
          echo   ^</ItemGroup^> >> Aimbot.vcxproj

          echo   ^<PropertyGroup Label="Globals"^> >> Aimbot.vcxproj
          echo     ^<ProjectGuid^>{C0DEBA5E-0000-0000-0000-000000000000}^</ProjectGuid^> >> Aimbot.vcxproj
          echo     ^<Keyword^>Win32Proj^</Keyword^> >> Aimbot.vcxproj
          echo     ^<WindowsTargetPlatformVersion^>10.0^</WindowsTargetPlatformVersion^> >> Aimbot.vcxproj
          echo   ^</PropertyGroup^> >> Aimbot.vcxproj

          echo   ^<Import Project="$(VCTargetsPath)\Microsoft.Cpp.Default.props" /^> >> Aimbot.vcxproj

          echo   ^<PropertyGroup Condition="'$(Configuration)|$(Platform)'=='Release|x64'" Label="Configuration"^> >> Aimbot.vcxproj
          echo     ^<ConfigurationType^>Application^</ConfigurationType^> >> Aimbot.vcxproj
          echo     ^<UseDebugLibraries^>false^</UseDebugLibraries^> >> Aimbot.vcxproj
          echo     ^<PlatformToolset^>v143^</PlatformToolset^> >> Aimbot.vcxproj
          echo     ^<WholeProgramOptimization^>true^</WholeProgramOptimization^> >> Aimbot.vcxproj
          echo     ^<CharacterSet^>Unicode^</CharacterSet^> >> Aimbot.vcxproj
          echo     ^<RuntimeLibrary^>MultiThreaded^</RuntimeLibrary^> >> Aimbot.vcxproj
          echo     ^<OutDir^>x64\Release\^</OutDir^> >> Aimbot.vcxproj
          echo     ^<OutputPath^>x64\Release\^</OutputPath^> >> Aimbot.vcxproj
          echo   ^</PropertyGroup^> >> Aimbot.vcxproj

          echo   ^<Import Project="$(VCTargetsPath)\Microsoft.Cpp.props" /^> >> Aimbot.vcxproj

          echo   ^<ItemDefinitionGroup Condition="'$(Configuration)|$(Platform)'=='Release|x64'"^> >> Aimbot.vcxproj
          echo     ^<ClCompile^> >> Aimbot.vcxproj
          echo       ^<WarningLevel^>Level3^</WarningLevel^> >> Aimbot.vcxproj
          echo       ^<PreprocessorDefinitions^>WIN32;NDEBUG;_CONSOLE;_CRT_SECURE_NO_WARNINGS;%(PreprocessorDefinitions)^</PreprocessorDefinitions^> >> Aimbot.vcxproj
          echo       ^<SDLCheck^>true^</SDLCheck^> >> Aimbot.vcxproj
          echo     ^</ClCompile^> >> Aimbot.vcxproj
          echo     ^<Link^> >> Aimbot.vcxproj
          echo       ^<SubSystem^>Windows^</SubSystem^> >> Aimbot.vcxproj
          echo       ^<EnableCOMDATFolding^>true^</EnableCOMDATFolding^> >> Aimbot.vcxproj
          echo       ^<OptimizeReferences^>true^</OptimizeReferences^> >> Aimbot.vcxproj
          echo       ^<AdditionalDependencies^>shell32.lib;kernel32.lib;user32.lib;gdi32.lib;%(AdditionalDependencies)^</AdditionalDependencies^> >> Aimbot.vcxproj
          echo     ^</Link^> >> Aimbot.vcxproj
          echo   ^</ItemDefinitionGroup^> >> Aimbot.vcxproj

          echo   ^<ItemGroup^> >> Aimbot.vcxproj
          echo     ^<ClCompile Include="main.cpp" /^> >> Aimbot.vcxproj
          echo   ^</ItemGroup^> >> Aimbot.vcxproj

          echo   ^<Import Project="$(VCTargetsPath)\Microsoft.Cpp.targets" /^> >> Aimbot.vcxproj
          echo ^</Project^> >> Aimbot.vcxproj

      - name: Build Release x64
        run: msbuild Aimbot.vcxproj /p:Configuration=Release /p:Platform=x64 /m /verbosity:minimal

      - name: Upload Aimbot.exe
        uses: actions/upload-artifact@v4
        with:
          name: HD-Player-Aimbot-EXE
          path: x64/Release/Aimbot.exe
          if-no-files-found: error
          retention-days: 30
