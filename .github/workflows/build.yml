name: Build Aimbot EXE (Windows x64)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Setup Visual Studio Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Create Aimbot.vcxproj
        shell: pwsh
        run: |
          # Create vcxproj file safely line by line
          "<?xml version=`"1.0`" encoding=`"utf-8`"?>" | Out-File -FilePath "Aimbot.vcxproj" -Encoding utf8
          "<Project DefaultTargets=`"Build`" xmlns=`"http://schemas.microsoft.com/developer/msbuild/2003`">" | Add-Content "Aimbot.vcxproj"
          "  <ItemGroup Label=`"ProjectConfigurations`">" | Add-Content "Aimbot.vcxproj"
          "    <ProjectConfiguration Include=`"Release|x64`">" | Add-Content "Aimbot.vcxproj"
          "      <Configuration>Release</Configuration>" | Add-Content "Aimbot.vcxproj"
          "      <Platform>x64</Platform>" | Add-Content "Aimbot.vcxproj"
          "    </ProjectConfiguration>" | Add-Content "Aimbot.vcxproj"
          "  </ItemGroup>" | Add-Content "Aimbot.vcxproj"
          "  <PropertyGroup Condition=`"'$(Configuration)|$(Platform)'=='Release|x64'`" Label=`"Configuration`">" | Add-Content "Aimbot.vcxproj"
          "    <ConfigurationType>Application</ConfigurationType>" | Add-Content "Aimbot.vcxproj"
          "    <UseDebugLibraries>false</UseDebugLibraries>" | Add-Content "Aimbot.vcxproj"
          "    <PlatformToolset>v143</PlatformToolset>" | Add-Content "Aimbot.vcxproj"
          "    <WholeProgramOptimization>true</WholeProgramOptimization>" | Add-Content "Aimbot.vcxproj"
          "    <CharacterSet>Unicode</CharacterSet>" | Add-Content "Aimbot.vcxproj"
          "    <RuntimeLibrary>MultiThreaded</RuntimeLibrary>" | Add-Content "Aimbot.vcxproj"
          "  </PropertyGroup>" | Add-Content "Aimbot.vcxproj"
          "  <Import Project=`"$(VCTargetsPath)\Microsoft.Cpp.props`" />" | Add-Content "Aimbot.vcxproj"
          "  <ItemGroup>" | Add-Content "Aimbot.vcxproj"
          "    <ClCompile Include=`"main.cpp`" />" | Add-Content "Aimbot.vcxproj"
          "  </ItemGroup>" | Add-Content "Aimbot.vcxproj"
          "  <Import Project=`"$(VCTargetsPath)\Microsoft.Cpp.targets`" />" | Add-Content "Aimbot.vcxproj"
          "</Project>" | Add-Content "Aimbot.vcxproj"

      - name: Build Release x64
        run: msbuild Aimbot.vcxproj /p:Configuration=Release /p:Platform=x64 /m /verbosity:minimal

      - name: Upload Aimbot.exe
        uses: actions/upload-artifact@v4
        with:
          name: Aimbot-EXE
          path: x64/Release/Aimbot.exe
          if-no-files-found: error
          retention-days: 30
